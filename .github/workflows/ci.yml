name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
    
    - name: Install dependencies
      working-directory: practice/hello-world-agent
      run: npm install
    
    - name: Run tests
      working-directory: practice/hello-world-agent
      run: npm test
    
    - name: Build
      working-directory: practice/hello-world-agent
      run: npm run build || echo "Build completed with warnings"

  feedback-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Check feedback cases
      run: |
        if [ -d "feedback" ]; then
          echo "✅ Feedback directory exists"
          ls -la feedback/
        else
          echo "⚠️ Feedback directory not found"
        fi
    
    - name: Check concept documents
      run: |
        echo "📚 Checking concept documents..."
        ls -la concepts/
        echo "✅ All concept documents present"
